   <div class="column middle">
      <section>
         <h1>Pisica de casă</h1>
         <h1>Înregistrează utilizatorul &#9786;</h1>
         <form>
            <fieldset>
               <legend>Informații generale</legend>
               &#128603;<label for="nutilizator">Nume utilizator:</label>&#128600;<br>
               <input type="text" id="nutilizator" name="nutilizator"><br>
               &#128603;<label for="parola">Parola:</label>&#128600;<br>
               <input type="password" id="parola" name="password"><br>
               &#128603;<label for="prenume">Prenume:</label>&#128600;<br>
               <input type="text" id="prenume" name="prenume"><br>
               &#128603;<label for="nume">Nume:</label>&#128600;<br>
               <input type="text" id="nume" name="nume"><br>
               &#128603;<label for="email">Email:</label>&#128600;<br>
               <input type="email" id="email" name="email"><br>
               &#128603;<label for="telefon">Telefon:</label>&#128600;<br>
               <input type="tel" id="telefon" name="telefon"><br>
            </fieldset>
            <fieldset>
               <legend>Informații personale</legend>
               &#128603;<label for="sex">Sex:</label>&#128600;<br>
               <select id="sex" name="sex">
                  <option value="feminin">Feminin</option>
                  <option value="masculin">Masculin</option>
                  <option value="altul">Altul</option>
               </select>
               <br>
               &#128603;<label for="mancare">Mâncare preferată:</label>&#128600;<br>
               <input list="feluri" id="mancare" name="mancare">
               <datalist id="feluri">
                  <option value="sarmale">Sarmale</option>
                  <option value="panettone">Panettone</option>
                  <option value="sushi">Sushi</option>
                  <option value="tot">De toate</option>
               </datalist>
               <br>
               &#128603;<label for="culoare">Culoarea preferată:</label>&#128600;<br>
               <input type="color" id="culoare" name="culoare"><br>
               &#128603;<label for="dnastere">Data nașterii:</label>&#128600;<br>
               <input type="date" id="dnastere" name="dnastere"><br>
               &#128603;<label for="onastere">Ora nașterii:</label>&#128600;<br>
               <input type="time" id="onastere" name="onastere"><br>
               &#128603;<label for="varsta">Vârsta:</label>&#128600;<br>
               <input type="range" id="varsta" name="varsta" min="0" max="100"><br>
               &#128603;<label for="website">Adresa paginii personale:</label>&#128600;<br>
               <input type="url" id="website" name="website"><br>
               &#128603;<label for="descriere">Descriere:</label>&#128600;<br>
               <textarea id="descriere" name="descriere" rows="4" cols="40"></textarea>
            </fieldset>
         </form>
         <hr>
         <!--<button type="submit" disabled>Înregistrează</button>-->
         <!--am adaugat functia de inregistreaza-->
         <button class="myButton" onclick="inregistreaza()">Înregistrează</button>
         <p id="rezultat"></p>
      </section>
